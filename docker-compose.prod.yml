# Full-stack local deployment — run everything in containers
# Usage: docker compose -f docker-compose.prod.yml up --build

services:
  postgres:
    image: postgres:16
    ports:
      - "127.0.0.1:5432:5432"
    environment:
      POSTGRES_USER: mindshed
      POSTGRES_PASSWORD: mindshed
      POSTGRES_DB: mindshed
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mindshed"]
      interval: 5s
      timeout: 3s
      retries: 5

  minio:
    image: minio/minio:latest
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"
    environment:
      MINIO_ROOT_USER: mindshed
      MINIO_ROOT_PASSWORD: mindshed123
      MINIO_CORS_ALLOW_ORIGIN: http://localhost:3000
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 3s
      retries: 5

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: /bin/sh
    command: /init-minio.sh
    volumes:
      - ./docker/init-minio.sh:/init-minio.sh:ro

  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://mindshed:mindshed@postgres:5432/mindshed
      R2_ENDPOINT: http://minio:9000
      R2_ACCESS_KEY_ID: mindshed
      R2_SECRET_ACCESS_KEY: mindshed123
      R2_BUCKET_NAME: mindshed-images
      APP_SECRET: local-docker-secret
    depends_on:
      postgres:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully

  # Run Prisma migrations after app container is built
  migrate:
    build: .
    command: sh -c "npx prisma db push && echo 'Migrations complete'"
    environment:
      DATABASE_URL: postgresql://mindshed:mindshed@postgres:5432/mindshed
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
  minio_data:
